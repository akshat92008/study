name: External Event Worker Cron

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  process-events:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call event worker
        env:
          COGNITION_WORKER_URL: ${{ secrets.COGNITION_WORKER_URL }}
          INTERNAL_CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
        run: |
          test -n "$COGNITION_WORKER_URL"
          test -n "$INTERNAL_CRON_SECRET"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${INTERNAL_CRON_SECRET}" \
            --max-time 55 \
            "${COGNITION_WORKER_URL}"
