name: Cron - Decay Detector
on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Decay Detector
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/decay-detector" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --fail
