name: Process Events Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Call Process Events Route
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST "$COGNITION_WORKER_URL" -H "Authorization: Bearer $INTERNAL_CRON_SECRET")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Worker failed with status $http_code"
            exit 1
          fi
        env:
          COGNITION_WORKER_URL: ${{ secrets.COGNITION_WORKER_URL }}
          INTERNAL_CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
