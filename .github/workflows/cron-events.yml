name: Cron - Process Events
on:
  schedule:
    - cron: "*/15 * * * *" # Runs every 15 minutes (Updated from daily to ensure events process promptly)
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Process Events
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/internal/workers/process-events" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --fail
