name: Cron - Daily Synthesis
on:
  schedule:
    - cron: "0 8 * * *" # Runs at 08:00 UTC every day
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Synthesis
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/daily-synthesis" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --fail
