name: Cron - Weekly Synthesis
on:
  schedule:
    - cron: "0 12 * * 0" # Runs at 12:00 UTC on Sundays
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Weekly Synthesis
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/weekly-synthesis" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --fail
